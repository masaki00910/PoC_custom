// ── LoginPage ───────────────────────────────────────────────
const LoginPage = ({ onLogin }) => {
  const [id, setId] = useState('');
  const [pw, setPw] = useState('');
  const [err, setErr] = useState('');
  const [loading, setLoading] = useState(false);
  const handleSubmit = e => {
    e.preventDefault();
    if(!id||!pw){setErr('IDとパスワードを入力してください。');return;}
    setLoading(true); setErr('');
    setTimeout(()=>{ setLoading(false); onLogin(id); }, 700);
  };
  return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'linear-gradient(135deg,#e5e7eb 0%,#f3f4f6 50%,#fff 100%)'}}>
      <div style={{width:380,background:'#fff',borderRadius:16,boxShadow:'0 20px 60px rgba(0,0,0,.12)',overflow:'hidden'}}>
        <div style={{background:'#fff',borderBottom:'1px solid var(--border)',padding:'32px 32px 24px',textAlign:'center'}}>
          <div style={{display:'inline-flex',alignItems:'center',justifyContent:'center',width:52,height:52,background:'var(--accent)',borderRadius:12,marginBottom:14}}>
            <svg width="26" height="26" fill="none" viewBox="0 0 24 24"><path d="M9 12h6M9 16h6M7 8h10M5 4h14a1 1 0 011 1v14a1 1 0 01-1 1H5a1 1 0 01-1-1V5a1 1 0 011-1z" stroke="#fff" strokeWidth="1.8" strokeLinecap="round"/></svg>
          </div>
          <div style={{color:'var(--navy-900)',fontSize:17,fontWeight:700}}>エラー回復システム</div>
          <div style={{color:'var(--gray)',fontSize:12,marginTop:4}}>Error Recovery System</div>
        </div>
        <form onSubmit={handleSubmit} style={{padding:'28px 32px 32px'}}>
          <div style={{marginBottom:16}}>
            <label style={{display:'block',fontSize:12,fontWeight:600,color:'var(--navy-700)',marginBottom:6}}>ユーザーID</label>
            <input value={id} onChange={e=>setId(e.target.value)} style={{width:'100%',padding:'10px 14px',border:'1.5px solid var(--border)',borderRadius:8,fontSize:14,outline:'none'}}
              onFocus={e=>e.target.style.borderColor='var(--accent)'} onBlur={e=>e.target.style.borderColor='var(--border)'}
              placeholder="例: tanaka" autoComplete="username"/>
          </div>
          <div style={{marginBottom:20}}>
            <label style={{display:'block',fontSize:12,fontWeight:600,color:'var(--navy-700)',marginBottom:6}}>パスワード</label>
            <input type="password" value={pw} onChange={e=>setPw(e.target.value)} style={{width:'100%',padding:'10px 14px',border:'1.5px solid var(--border)',borderRadius:8,fontSize:14,outline:'none'}}
              onFocus={e=>e.target.style.borderColor='var(--accent)'} onBlur={e=>e.target.style.borderColor='var(--border)'}
              placeholder="••••••••" autoComplete="current-password"/>
          </div>
          {err && <div style={{fontSize:12,color:'var(--red)',marginBottom:12,padding:'8px 12px',background:'var(--red-lt)',borderRadius:6}}>{err}</div>}
          <button type="submit" disabled={loading}
            style={{width:'100%',padding:'12px',background:loading?'#93c5fd':'var(--accent)',color:'#fff',border:'none',borderRadius:8,fontSize:14,fontWeight:600,cursor:loading?'wait':'pointer'}}>
            {loading?'ログイン中...':'ログイン'}
          </button>
          <div style={{textAlign:'center',marginTop:14,fontSize:12,color:'var(--gray)'}}>
            デモ：<code style={{background:'var(--gray-lt)',padding:'1px 6px',borderRadius:4}}>admin</code> でログインすると管理者権限
          </div>
        </form>
      </div>
    </div>
  );
};

// ── ListPage ────────────────────────────────────────────────
const ListPage = ({ onOpenChat, rowHeight, fontSize, userId, isAdmin }) => {
  const [search, setSearch] = useState('');
  const [filterStatus, setFilterStatus] = useState('');
  const [page, setPage] = useState(1);
  const [sort, setSort] = useState({key:'no',dir:'asc'});
  const PER_PAGE = 20;

  // ログインユーザーの案件のみ表示（管理者は全件）
  const myData = isAdmin ? sampleData : sampleData.filter(r=>r.assignee===userId);

  const filtered = myData.filter(r=>{
    const q = search.toLowerCase();
    return (!q||r.secNo.toLowerCase().includes(q)||r.status.includes(q)||r.importDate.includes(q))
      && (!filterStatus||r.status===filterStatus);
  }).sort((a,b)=>{
    let va=a[sort.key],vb=b[sort.key];
    if(typeof va==='string') return sort.dir==='asc'?va.localeCompare(vb,'ja'):vb.localeCompare(va,'ja');
    return sort.dir==='asc'?va-vb:vb-va;
  });

  const totalPages = Math.ceil(filtered.length/PER_PAGE);
  const paged = filtered.slice((page-1)*PER_PAGE, page*PER_PAGE);
  const toggleSort = key=>{ setSort(s=>s.key===key?{...s,dir:s.dir==='asc'?'desc':'asc'}:{key,dir:'asc'}); setPage(1); };
  const SortIcon = ({k})=> sort.key!==k ? <span style={{opacity:.3,marginLeft:4}}>↕</span> : <span style={{marginLeft:4,color:'var(--accent)'}}>{sort.dir==='asc'?'↑':'↓'}</span>;
  const statusCounts = STATUSES.reduce((acc,s)=>{acc[s]=myData.filter(r=>r.status===s).length;return acc;},{});

  return (
    <div style={{flex:1,overflowY:'auto',padding:'24px 28px',fontSize}}>
      <div style={{marginBottom:20}}>
        <h1 style={{fontSize:20,fontWeight:700,color:'var(--navy-900)'}}>担当一覧</h1>
        <p style={{fontSize:13,color:'var(--gray)',marginTop:3}}>
          {isAdmin ? `全担当者の案件を表示中（${sampleData.length}件）` : `${userId} さんに割り当てられた案件を表示中`}
        </p>
      </div>
      {/* Status summary cards */}
      <div style={{display:'flex',gap:10,marginBottom:20,flexWrap:'wrap'}}>
        {STATUSES.map(s=>{
          const st=STATUS_STYLE[s];
          return (
            <button key={s} onClick={()=>{setFilterStatus(filterStatus===s?'':s);setPage(1);}}
              style={{padding:'10px 16px',borderRadius:8,border:`1.5px solid ${filterStatus===s?st.dot:'var(--border)'}`,background:filterStatus===s?st.bg:'#fff',cursor:'pointer',textAlign:'left',transition:'all .15s',boxShadow:filterStatus===s?`0 0 0 2px ${st.dot}30`:'var(--shadow-sm)'}}>
              <div style={{fontSize:18,fontWeight:700,color:st.color}}>{statusCounts[s]}</div>
              <div style={{fontSize:11,color:'var(--gray)',marginTop:2}}>{s}</div>
            </button>
          );
        })}
      </div>
      {/* Search bar */}
      <div style={{background:'#fff',borderRadius:10,padding:'12px 16px',marginBottom:16,boxShadow:'var(--shadow-sm)',display:'flex',gap:10,alignItems:'center',flexWrap:'wrap'}}>
        <div style={{position:'relative',flex:'1 1 200px'}}>
          <svg style={{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',opacity:.4}} width="14" height="14" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="#374151" strokeWidth="2"/><path d="M16.5 16.5l4 4" stroke="#374151" strokeWidth="2" strokeLinecap="round"/></svg>
          <input value={search} onChange={e=>{setSearch(e.target.value);setPage(1);}} placeholder="証券番号・ステータスで検索..."
            style={{width:'100%',padding:'8px 12px 8px 32px',border:'1.5px solid var(--border)',borderRadius:7,fontSize:13,outline:'none'}}
            onFocus={e=>e.target.style.borderColor='var(--accent)'} onBlur={e=>e.target.style.borderColor='var(--border)'}/>
        </div>
        <select value={filterStatus} onChange={e=>{setFilterStatus(e.target.value);setPage(1);}}
          style={{padding:'8px 12px',border:'1.5px solid var(--border)',borderRadius:7,fontSize:13,background:'#fff',color:'var(--navy-800)',outline:'none',minWidth:120}}>
          <option value="">全ステータス</option>
          {STATUSES.map(s=><option key={s} value={s}>{s}</option>)}
        </select>
        <span style={{fontSize:13,color:'var(--gray)',whiteSpace:'nowrap'}}>{filtered.length}件</span>
      </div>
      {/* Table */}
      <div style={{background:'#fff',borderRadius:10,boxShadow:'var(--shadow-sm)',overflow:'hidden'}}>
        <table style={{width:'100%',borderCollapse:'collapse',fontSize}}>
          <thead>
            <tr style={{background:'var(--navy-50)',borderBottom:'2px solid var(--border)'}}>
              {[['no','No.'],['secNo','証券番号'],['status','ステータス'],['importDate','取込日'],...(isAdmin?[['assignee','担当者']]:[])] .map(([k,label])=>(
                <th key={k} onClick={()=>toggleSort(k)} style={{padding:'11px 18px',textAlign:'left',fontSize:12,fontWeight:700,color:'var(--navy-700)',cursor:'pointer',userSelect:'none',whiteSpace:'nowrap'}}>
                  {label}<SortIcon k={k}/>
                </th>
              ))}
              <th style={{padding:'11px 18px',textAlign:'center',fontSize:12,fontWeight:700,color:'var(--navy-700)'}}>操作</th>
            </tr>
          </thead>
          <tbody>
            {paged.map((row,i)=>(
              <tr key={row.no} style={{borderBottom:'1px solid var(--border)',background:i%2===0?'#fff':'var(--navy-50)',transition:'background .1s'}}
                onMouseEnter={e=>e.currentTarget.style.background='var(--accent-lt)'}
                onMouseLeave={e=>e.currentTarget.style.background=i%2===0?'#fff':'var(--navy-50)'}>
                <td style={{padding:`${rowHeight/2-8}px 18px`,color:'var(--gray)',fontSize:12}}>{pad(row.no,3)}</td>
                <td style={{padding:`${rowHeight/2-8}px 18px`,fontWeight:600,color:'var(--navy-900)',fontFamily:'monospace',fontSize:13}}>{row.secNo}</td>
                <td style={{padding:`${rowHeight/2-8}px 18px`}}><StatusBadge status={row.status}/></td>
                <td style={{padding:`${rowHeight/2-8}px 18px`,color:'var(--gray)',fontSize:12}}>{row.importDate}</td>
                {isAdmin && <td style={{padding:`${rowHeight/2-8}px 18px`,fontSize:12,color:'var(--navy-700)'}}>{row.assignee}</td>}
                <td style={{padding:`${rowHeight/2-8}px 18px`,textAlign:'center'}}>
                  <button onClick={()=>onOpenChat(row)}
                    style={{padding:'5px 14px',background:'var(--accent)',color:'#fff',border:'none',borderRadius:6,fontSize:12,fontWeight:600,cursor:'pointer',transition:'opacity .15s'}}
                    onMouseEnter={e=>e.target.style.opacity='.85'} onMouseLeave={e=>e.target.style.opacity='1'}>
                    チャットを開く
                  </button>
                </td>
              </tr>
            ))}
            {paged.length===0 && <tr><td colSpan={5} style={{padding:40,textAlign:'center',color:'var(--gray)',fontSize:14}}>該当するデータがありません</td></tr>}
          </tbody>
        </table>
        {totalPages>1 && (
          <div style={{padding:'12px 18px',display:'flex',alignItems:'center',justifyContent:'space-between',borderTop:'1px solid var(--border)',background:'var(--navy-50)'}}>
            <span style={{fontSize:12,color:'var(--gray)'}}>{(page-1)*PER_PAGE+1}〜{Math.min(page*PER_PAGE,filtered.length)} / {filtered.length}件</span>
            <div style={{display:'flex',gap:4}}>
              {[['«',1],['‹',page-1]].map(([l,p])=>(
                <button key={l} onClick={()=>setPage(p)} disabled={page===1} style={pgBtn(page===1)}>{l}</button>
              ))}
              {Array.from({length:totalPages},(_,i)=>i+1).filter(p=>Math.abs(p-page)<=2).map(p=>(
                <button key={p} onClick={()=>setPage(p)} style={pgBtn(false,p===page)}>{p}</button>
              ))}
              {[['›',page+1],['»',totalPages]].map(([l,p])=>(
                <button key={l} onClick={()=>setPage(p)} disabled={page===totalPages} style={pgBtn(page===totalPages)}>{l}</button>
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
};
const pgBtn=(disabled,active=false)=>({width:30,height:30,border:'1.5px solid var(--border)',borderRadius:6,background:active?'var(--accent)':'#fff',color:active?'#fff':disabled?'#d1d5db':'var(--navy-800)',fontSize:13,fontWeight:500,cursor:disabled?'default':'pointer'});

// ── ChatPage ────────────────────────────────────────────────
const ChatPage = ({ tabs, activeTabId, onTabChange, onTabClose, chatSplitPct, fontSize, messages, setMessages }) => {
  const [input, setInput] = useState('');
  const [typing, setTyping] = useState(false);
  const [scale, setScale] = useState(1);
  const [offset, setOffset] = useState({x:0,y:0});
  const [dragging, setDragging] = useState(false);
  const [viewerTab, setViewerTab] = useState('scan');
  const dragStart = useRef(null);
  const msgEndRef = useRef(null);
  const activeTab = tabs.find(t=>t.id===activeTabId);

  useEffect(()=>{
    if(activeTab && !messages[activeTabId])
      setMessages(m=>({...m,[activeTabId]:[
        {role:'ai',type:'recovery',secNo:activeTab.secNo},
        {role:'ai',text:`証券番号「${activeTab.secNo}」のエラー回復結果を上記の通り表示しました。ご確認の上、必要な対応をお知らせください。`}
      ]}));
  },[activeTabId]);

  useEffect(()=>{ msgEndRef.current?.scrollIntoView({behavior:'smooth'}); },[messages[activeTabId], typing]);
  useEffect(()=>{setScale(1);setOffset({x:0,y:0});},[activeTabId,viewerTab]);

  const msgs = messages[activeTabId]||[];
  const sendMsg = ()=>{
    if(!input.trim()||typing) return;
    const txt = input.trim();
    setMessages(m=>({...m,[activeTabId]:[...(m[activeTabId]||[]),{role:'user',text:txt}]}));
    setInput(''); setTyping(true);
    setTimeout(()=>{
      const fn = AI_RESPONSES[Math.floor(Math.random()*AI_RESPONSES.length)];
      setMessages(m=>({...m,[activeTabId]:[...(m[activeTabId]||[]),{role:'ai',text:fn(activeTab?.secNo)}]}));
      setTyping(false);
    }, 800+Math.random()*600);
  };

  const handleWheel=e=>{e.preventDefault();setScale(s=>Math.max(0.3,Math.min(4,s-e.deltaY*0.001)));};
  const handleMouseDown=e=>{setDragging(true);dragStart.current={x:e.clientX-offset.x,y:e.clientY-offset.y};};
  const handleMouseMove=e=>{if(!dragging||!dragStart.current)return;setOffset({x:e.clientX-dragStart.current.x,y:e.clientY-dragStart.current.y});};
  const handleMouseUp=()=>setDragging(false);

  if(tabs.length===0) return (
    <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:12,color:'var(--gray)'}}>
      <svg width="48" height="48" fill="none" viewBox="0 0 24 24" opacity=".3"><path d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/></svg>
      <div style={{fontSize:14}}>「担当一覧」から証券番号を選択してチャットを開いてください</div>
    </div>
  );

  return (
    <div style={{flex:1,display:'flex',flexDirection:'column',minHeight:0}}>
      {/* Sub-tab bar */}
      <div style={{background:'var(--gray-lt)',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'flex-end',overflowX:'auto',flexShrink:0,paddingLeft:8,paddingTop:6}}>
        {tabs.map(tab=>{
          const active=tab.id===activeTabId;
          return (
            <div key={tab.id} onClick={()=>onTabChange(tab.id)}
              style={{display:'flex',alignItems:'center',gap:8,padding:'8px 14px',cursor:'pointer',background:active?'#fff':'transparent',borderTop:`2px solid ${active?'var(--accent)':'transparent'}`,border:active?'1px solid var(--border)':'1px solid transparent',borderBottom:active?'1px solid #fff':'1px solid transparent',borderRadius:'6px 6px 0 0',marginRight:2,flexShrink:0,transition:'background .12s'}}>
              <StatusBadge status={tab.status}/>
              <span style={{fontSize:12,fontWeight:active?700:400,color:active?'var(--navy-900)':'var(--gray)',whiteSpace:'nowrap',maxWidth:130,overflow:'hidden',textOverflow:'ellipsis'}}>{tab.secNo}</span>
              <button onClick={e=>{e.stopPropagation();onTabClose(tab.id);}} style={{background:'none',border:'none',cursor:'pointer',color:'var(--gray)',fontSize:13,lineHeight:1,padding:'0 2px',borderRadius:3}}
                onMouseEnter={e=>e.target.style.color='var(--red)'} onMouseLeave={e=>e.target.style.color='var(--gray)'}>✕</button>
            </div>
          );
        })}
      </div>
      {/* Split pane */}
      {activeTab && (
        <div style={{display:'flex',flex:1,overflow:'hidden',minHeight:0}}>
          {/* Chat */}
          <div style={{width:`${chatSplitPct}%`,borderRight:'1px solid var(--border)',display:'flex',flexDirection:'column',background:'#fff',minWidth:0}}>
            <div style={{padding:'12px 16px',borderBottom:'1px solid var(--border)',background:'var(--navy-50)'}}>
              <div style={{fontSize:13,fontWeight:700,color:'var(--navy-900)'}}>{activeTab.secNo}</div>
              <div style={{display:'flex',alignItems:'center',gap:8,marginTop:4}}>
                <StatusBadge status={activeTab.status}/>
                <span style={{fontSize:11,color:'var(--gray)'}}>取込日: {activeTab.importDate}</span>
              </div>
            </div>
            <div style={{flex:1,overflowY:'auto',padding:'16px',display:'flex',flexDirection:'column',gap:12}}>
              {msgs.map((m,i)=>(
                <div key={i} style={{display:'flex',flexDirection:m.role==='user'?'row-reverse':'row',gap:8,alignItems:'flex-end',animation:'fadeIn .2s ease'}}>
                  {m.role==='ai' && <div style={{width:28,height:28,borderRadius:'50%',background:'var(--accent)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                    <svg width="13" height="13" fill="none" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4" stroke="#fff" strokeWidth="2"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" stroke="#fff" strokeWidth="2" strokeLinecap="round"/></svg>
                  </div>}
                  {m.type==='recovery' ? (
                    <RecoveryTable secNo={m.secNo}/>
                  ) : (
                    <div style={{maxWidth:'78%',padding:'9px 13px',borderRadius:m.role==='user'?'14px 14px 4px 14px':'14px 14px 14px 4px',background:m.role==='user'?'var(--accent)':'var(--navy-50)',color:m.role==='user'?'#fff':'var(--navy-900)',fontSize:13,lineHeight:1.6,boxShadow:'var(--shadow-sm)'}}>
                      {m.text}
                    </div>
                  )}
                </div>
              ))}
              {typing && (
                <div style={{display:'flex',gap:8,alignItems:'flex-end'}}>
                  <div style={{width:28,height:28,borderRadius:'50%',background:'var(--accent)',display:'flex',alignItems:'center',justifyContent:'center'}}>
                    <svg width="13" height="13" fill="none" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4" stroke="#fff" strokeWidth="2"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" stroke="#fff" strokeWidth="2" strokeLinecap="round"/></svg>
                  </div>
                  <div style={{padding:'10px 14px',borderRadius:'14px 14px 14px 4px',background:'var(--navy-50)',display:'flex',gap:4,alignItems:'center'}}>
                    {[0,1,2].map(j=><div key={j} style={{width:6,height:6,borderRadius:'50%',background:'var(--navy-500)',animation:'bounce 1.2s infinite',animationDelay:`${j*0.2}s`}}/>)}
                  </div>
                </div>
              )}
              <div ref={msgEndRef}/>
            </div>
            <div style={{padding:'10px 14px',borderTop:'1px solid var(--border)',background:'var(--navy-50)',display:'flex',gap:8,alignItems:'flex-end'}}>
              <textarea value={input} onChange={e=>setInput(e.target.value)}
                onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}}}
                placeholder="メッセージを入力... (Enterで送信)" rows={2}
                style={{flex:1,padding:'8px 12px',border:'1.5px solid var(--border)',borderRadius:8,fontSize:13,resize:'none',outline:'none',lineHeight:1.5}}
                onFocus={e=>e.target.style.borderColor='var(--accent)'} onBlur={e=>e.target.style.borderColor='var(--border)'}/>
              <button onClick={sendMsg} disabled={!input.trim()||typing}
                style={{padding:'9px 14px',background:input.trim()&&!typing?'var(--accent)':'#d1d5db',color:'#fff',border:'none',borderRadius:8,fontSize:13,fontWeight:600,cursor:input.trim()&&!typing?'pointer':'default',height:42,display:'flex',alignItems:'center',gap:5}}>
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
                送信
              </button>
            </div>
          </div>
          {/* Image viewer */}
          <div style={{flex:1,display:'flex',flexDirection:'column',background:'#f0f1f3',minWidth:0}}>
            {/* Viewer tabs */}
            <div style={{display:'flex',alignItems:'flex-end',background:'#e5e7eb',paddingLeft:8,paddingTop:6,borderBottom:'1px solid var(--border)',flexShrink:0,gap:2}}>
              {[
                {id:'scan',label:'申込書スキャン',icon:<path d="M4 4h12l4 4v12a2 2 0 01-2 2H4a2 2 0 01-2-2V6a2 2 0 012-2z M14 4v6h6" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>},
                {id:'contract',label:'既契約情報',icon:<path d="M9 12h6m-6 4h6M7 8h10M5 4h14a1 1 0 011 1v14a1 1 0 01-1 1H5a1 1 0 01-1-1V5a1 1 0 011-1z" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/>},
              ].map(t=>{
                const active=viewerTab===t.id;
                return (
                  <button key={t.id} onClick={()=>setViewerTab(t.id)}
                    style={{display:'flex',alignItems:'center',gap:6,padding:'8px 14px',border:'1px solid var(--border)',borderBottom:active?'1px solid #fff':'1px solid var(--border)',borderRadius:'7px 7px 0 0',background:active?'#fff':'transparent',color:active?'var(--navy-900)':'var(--gray)',fontSize:12,fontWeight:active?700:500,cursor:'pointer',marginBottom:-1,position:'relative'}}>
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none">{t.icon}</svg>
                    {t.label}
                    {t.id==='contract' && <span style={{marginLeft:4,padding:'1px 7px',borderRadius:10,fontSize:9,fontWeight:700,background:active?'var(--accent-lt)':'#d1d5db',color:active?'var(--accent)':'#6b7280'}}>参考</span>}
                  </button>
                );
              })}
            </div>
            <div style={{padding:'8px 14px',background:'#fff',display:'flex',alignItems:'center',gap:10,flexShrink:0,borderBottom:'1px solid var(--border)'}}>
              <span style={{color:'var(--gray)',fontSize:12,fontWeight:600}}>
                {viewerTab==='scan' ? '申込書スキャン画像' : 'エラー回復の根拠となった既契約データ'}
              </span>
              <div style={{flex:1}}/>
              <button onClick={()=>setScale(s=>Math.min(4,s+0.2))} style={zBtn}>＋</button>
              <span style={{color:'var(--gray)',fontSize:12,minWidth:40,textAlign:'center'}}>{Math.round(scale*100)}%</span>
              <button onClick={()=>setScale(s=>Math.max(0.3,s-0.2))} style={zBtn}>－</button>
              <button onClick={()=>{setScale(1);setOffset({x:0,y:0});}} style={{...zBtn,minWidth:56}}>リセット</button>
            </div>
            <div style={{flex:1,overflow:'hidden',cursor:dragging?'grabbing':'grab',position:'relative',userSelect:'none'}}
              onWheel={handleWheel} onMouseDown={handleMouseDown} onMouseMove={handleMouseMove} onMouseUp={handleMouseUp} onMouseLeave={handleMouseUp}>
              <div style={{position:'absolute',inset:0,display:'flex',alignItems:'flex-start',justifyContent:'center',padding:24,overflow:'hidden'}}>
                {viewerTab==='scan'
                  ? <ScanPlaceholder scale={scale} offset={offset} secNo={activeTab.secNo}/>
                  : <ContractPlaceholder scale={scale} offset={offset} secNo={activeTab.secNo}/>}
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};
const zBtn={background:'var(--gray-lt)',border:'1px solid var(--border)',color:'var(--navy-800)',borderRadius:5,padding:'4px 10px',fontSize:13,cursor:'pointer'};

// ── AdminPage ────────────────────────────────────────────────
const AdminPage = ({ fontSize }) => {
  const [users, setUsers] = useState(SAMPLE_USERS);
  const [editId, setEditId] = useState(null);
  const [editRole, setEditRole] = useState('');
  const statCounts = STATUSES.reduce((a,s)=>{a[s]=sampleData.filter(r=>r.status===s).length;return a;},{});

  return (
    <div style={{flex:1,overflowY:'auto',padding:'24px 28px',fontSize}}>
      <div style={{marginBottom:20}}>
        <h1 style={{fontSize:20,fontWeight:700,color:'var(--navy-900)'}}>管理者ダッシュボード</h1>
        <p style={{fontSize:13,color:'var(--gray)',marginTop:3}}>システム全体の状況とユーザー管理</p>
      </div>

      {/* Stats */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(130px,1fr))',gap:12,marginBottom:28}}>
        <StatCard label="総件数" value={sampleData.length} color="var(--accent)"/>
        {STATUSES.map(s=><StatCard key={s} label={s} value={statCounts[s]} color={STATUS_STYLE[s].dot}/>)}
      </div>

      {/* User management */}
      <div style={{background:'#fff',borderRadius:10,boxShadow:'var(--shadow-sm)',overflow:'hidden'}}>
        <div style={{padding:'14px 18px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div style={{fontWeight:700,fontSize:14,color:'var(--navy-900)'}}>ユーザー管理</div>
          <span style={{fontSize:12,color:'var(--gray)'}}>{users.length}名</span>
        </div>
        <table style={{width:'100%',borderCollapse:'collapse',fontSize}}>
          <thead>
            <tr style={{background:'var(--navy-50)',borderBottom:'1px solid var(--border)'}}>
              {['ユーザーID','氏名','部署','権限','最終ログイン','操作'].map(h=>(
                <th key={h} style={{padding:'10px 16px',textAlign:'left',fontSize:12,fontWeight:700,color:'var(--navy-700)',whiteSpace:'nowrap'}}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {users.map((u,i)=>(
              <tr key={u.id} style={{borderBottom:'1px solid var(--border)',background:i%2===0?'#fff':'var(--navy-50)'}}>
                <td style={{padding:'10px 16px',fontFamily:'monospace',fontSize:12,color:'var(--gray)'}}>{u.id}</td>
                <td style={{padding:'10px 16px',fontWeight:600,color:'var(--navy-900)'}}>{u.name}</td>
                <td style={{padding:'10px 16px',fontSize:12,color:'var(--gray)'}}>{u.dept}</td>
                <td style={{padding:'10px 16px'}}>
                  {editId===u.id ? (
                    <select value={editRole} onChange={e=>setEditRole(e.target.value)}
                      style={{padding:'4px 8px',border:'1px solid var(--border)',borderRadius:5,fontSize:12,background:'#fff'}}>
                      <option value="user">一般</option>
                      <option value="admin">管理者</option>
                    </select>
                  ) : (
                    <span style={{display:'inline-flex',alignItems:'center',gap:5,padding:'2px 8px',borderRadius:20,fontSize:12,fontWeight:600,background:u.role==='admin'?'var(--accent-lt)':'var(--gray-lt)',color:u.role==='admin'?'var(--accent)':'var(--gray)'}}>
                      {u.role==='admin'?'管理者':'一般'}
                    </span>
                  )}
                </td>
                <td style={{padding:'10px 16px',fontSize:12,color:'var(--gray)'}}>{u.lastLogin}</td>
                <td style={{padding:'10px 16px'}}>
                  {editId===u.id ? (
                    <div style={{display:'flex',gap:6}}>
                      <button onClick={()=>{setUsers(us=>us.map(x=>x.id===u.id?{...x,role:editRole}:x));setEditId(null);}}
                        style={{padding:'4px 10px',background:'var(--accent)',color:'#fff',border:'none',borderRadius:5,fontSize:12,cursor:'pointer'}}>保存</button>
                      <button onClick={()=>setEditId(null)}
                        style={{padding:'4px 10px',background:'var(--gray-lt)',border:'1px solid var(--border)',color:'var(--gray)',borderRadius:5,fontSize:12,cursor:'pointer'}}>キャンセル</button>
                    </div>
                  ) : (
                    <button onClick={()=>{setEditId(u.id);setEditRole(u.role);}}
                      style={{padding:'4px 10px',background:'var(--gray-lt)',border:'1px solid var(--border)',color:'var(--navy-800)',borderRadius:5,fontSize:12,cursor:'pointer'}}>編集</button>
                  )}
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
};

const StatCard = ({ label, value, color }) => (
  <div style={{background:'#fff',borderRadius:10,padding:'16px 18px',boxShadow:'var(--shadow-sm)',borderLeft:`3px solid ${color}`}}>
    <div style={{fontSize:22,fontWeight:700,color}}>{value}</div>
    <div style={{fontSize:12,color:'var(--gray)',marginTop:4}}>{label}</div>
  </div>
);

// ── App ──────────────────────────────────────────────────────
const App = () => {
  const [loggedIn, setLoggedIn] = useState(()=>!!localStorage.getItem('app_userId'));
  const [userId, setUserId] = useState(()=>localStorage.getItem('app_userId')||'');
  const [isAdmin, setIsAdmin] = useState(()=>localStorage.getItem('app_role')==='admin');
  const [page, setPage] = useState(()=>localStorage.getItem('app_page')||'list');
  const [tabs, setTabs] = useState([]);
  const [activeTabId, setActiveTabId] = useState(null);
  const [chatMessages, setChatMessages] = useState({});
  const [rowHeight, setRowHeight] = useState(44);
  const [fontSize, setFontSize] = useState(13);
  const [chatSplitPct, setChatSplitPct] = useState(42);

  const handleLogin = id => {
    const admin = id.toLowerCase()==='admin'||id.toLowerCase().includes('admin');
    setUserId(id); setIsAdmin(admin); setLoggedIn(true);
    localStorage.setItem('app_userId', id);
    localStorage.setItem('app_role', admin?'admin':'user');
    setPage('list');
  };
  const handleLogout = () => {
    localStorage.clear();
    setLoggedIn(false); setUserId(''); setIsAdmin(false); setTabs([]); setActiveTabId(null);
  };
  const navigate = p => {
    setPage(p);
    localStorage.setItem('app_page', p);
    if(p==='admin'&&!isAdmin) return; // guard
  };
  const openChat = row => {
    if(!tabs.find(t=>t.id===row.secNo)) setTabs(t=>[...t,{...row,id:row.secNo}]);
    setActiveTabId(row.secNo);
    setPage('chat');
    localStorage.setItem('app_page','chat');
  };
  const closeTab = id => {
    setTabs(t=>{
      const next=t.filter(x=>x.id!==id);
      if(activeTabId===id) setActiveTabId(next.length>0?next[next.length-1].id:null);
      return next;
    });
    // タブを閉じた時のみ履歴を削除
    setChatMessages(m=>{ const n={...m}; delete n[id]; return n; });
  };

  useEffect(()=>{
    const panel=document.getElementById('tweaks-panel');
    const rowEl=document.getElementById('tw-row-height');
    const fontEl=document.getElementById('tw-font-size');
    const splitEl=document.getElementById('tw-chat-split');
    if(!panel) return;
    rowEl?.addEventListener('input',e=>setRowHeight(+e.target.value));
    fontEl?.addEventListener('input',e=>setFontSize(+e.target.value));
    splitEl?.addEventListener('change',e=>setChatSplitPct(+e.target.value));
    window.addEventListener('message',e=>{
      if(e.data?.type==='__activate_edit_mode') panel.classList.add('visible');
      if(e.data?.type==='__deactivate_edit_mode') panel.classList.remove('visible');
    });
    window.parent.postMessage({type:'__edit_mode_available'},'*');
  },[]);

  if(!loggedIn) return <LoginPage onLogin={handleLogin}/>;

  return (
    <div style={{height:'100vh',display:'flex',flexDirection:'column',fontSize,overflow:'hidden'}}>
      <TopNav userId={userId} isAdmin={isAdmin} currentPage={page} onNavigate={navigate} onLogout={handleLogout}/>
      <div style={{flex:1,display:'flex',flexDirection:'column',minHeight:0,overflow:'hidden'}}>
        {page==='list' && <ListPage onOpenChat={openChat} rowHeight={rowHeight} fontSize={fontSize} userId={userId} isAdmin={isAdmin}/>}
        {page==='chat' && <ChatPage tabs={tabs} activeTabId={activeTabId} onTabChange={setActiveTabId} onTabClose={closeTab} chatSplitPct={chatSplitPct} fontSize={fontSize} messages={chatMessages} setMessages={setChatMessages}/>}
        {page==='admin' && isAdmin && <AdminPage fontSize={fontSize}/>}
        {page==='admin' && !isAdmin && <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',color:'var(--red)',fontSize:14}}>管理者権限がありません</div>}
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
