# Minimal Alembic config for Aflac PoC database migration tests.
# Production setup will be wired into scripts/apply_migrations.py later.

[alembic]
# Path containing versions/ (resolved relative to this ini file)
script_location = %(here)s

# Revision filename template
file_template = %%(rev)s_%%(slug)s

# DB URL is taken from DATABASE_URL env var inside env.py; leave blank here.
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
